# Local development orchestration (modules 4, 6, 7).
# Production uses managed/redundant equivalents (System Architecture §12, §26) — this file is for dev/CI parity.
services:
  postgres:
    image: postgres:16-alpine
    container_name: edu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-edu_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - edu_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu_app} -d ${POSTGRES_DB:-edu_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edu_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - edu_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: edu_backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu_app}:${POSTGRES_PASSWORD:-change_me_in_local_only}@postgres:5432/${POSTGRES_DB:-edu_platform}?schema=public
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  edu_pgdata:
  edu_redisdata:
