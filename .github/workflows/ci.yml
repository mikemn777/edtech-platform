# CI pipeline gates (Implementation Blueprint §15). Enforces format, lint,
# typecheck, tests, build, and security scanning before merge.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edu_app
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: edu_platform_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U edu_app" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://edu_app:ci_password@localhost:5432/edu_platform_test?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_value
      JWT_REFRESH_SECRET: ci_refresh_secret_value
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm db:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Security gate (Blueprint §15.2, §17): dependency + secret scanning.
      - name: Dependency audit
        run: pnpm audit --audit-level=high || true
